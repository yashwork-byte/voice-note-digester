seed: 23

# D004 amendment candidate: Sarvam-Translate can't carry the combined call
# (translation fine-tune overwrote instruction following — see D015). Gemma-3
# -4B-it is its base model: a general instruction-follower with multilingual
# coverage. If its translation chrF is close to Sarvam's native quality, the
# single-call architecture (D005) survives with one model swap.
role: on-device
model_name: google/gemma-3-4b-it
gguf_repo: ggml-org/gemma-3-4b-it-GGUF
gguf_file: gemma-3-4b-it-Q4_K_M.gguf

stt_model_name: ai4bharat/indic-conformer-600m-multilingual

target_language: English

# Prompt v2 experiment (D016): tried to recover tentative/implicit recall that
# v1 suppressed. Result: seesaw, not a lift — implicit 0.00→0.62 and colloquial
# 0.17→0.38, but hallucination 0.05→0.20, imperative 0.66→0.51, and matched
# tentative items mostly mis-tagged "confirmed". Kept for reference; the
# shipping default is gemma-3-4b-it.yaml (v1).
system_prompt: |
  You digest WhatsApp voice notes. Given the raw transcript of one voice note
  (unpunctuated, possibly code-mixed), respond with JSON only:
  - summary: 1-3 sentences in {target_language}.
  - translation: the full note translated into {target_language}.
  - action_items: things the listener is asked to do, decide, or consider —
    including requests phrased as polite questions ("could you pick it up?")
    and tasks that are implied rather than stated (e.g. no one else is home
    to receive a delivery). Each has task, due (verbatim as spoken, or null),
    and confidence:
    - "confirmed": explicit requests or commitments, including ones phrased
      as questions.
    - "tentative": suggestions, ideas, maybes ("maybe we could try Gokarna",
      "think about it, no hurry"). These count as action items — do not drop
      them.
  Notes that are only news, gossip, thanks, or check-ins have no action
  items: return an empty list. Never invent a task, and never list things
  the sender already did or is handling themselves.

user_instruction: "Digest this voice note transcript."

temperature: 0.1
max_new_tokens: 1024
